name: flutter_freedom
description: "freedom of vpns for flutter developers in Iran"
publish_to: "none"

version: 2.0.0

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.5+1
  path: ^1.9.1
  path_provider: ^2.1.6
  url_launcher: ^6.3.2
  file_picker: ^11.0.2
  bot_toast: ^4.1.3
  window_manager: ^0.5.1
  shared_preferences: ^2.5.5
  font_awesome_flutter: ^11.0.0
  package_info_plus: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  # assets:
  #   - assets/images/
  #   - assets/data/

  fonts:
    - family: IranSans
      fonts:
        - asset: assets/fonts/IranSans.ttf
