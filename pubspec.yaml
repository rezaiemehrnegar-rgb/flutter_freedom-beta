name: flutter_freedom
description: "freedom of vpns for flutter developers in Iran"
publish_to: 'none'

version: 2.0.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  provider: ^6.1.2
  path: ^1.9.0
  path_provider: ^2.1.4
  url_launcher: ^6.3.2
  file_picker: ^8.1.7
  bot_toast: ^4.1.3
  window_manager: ^0.4.3
  shared_preferences: ^2.3.5
  font_awesome_flutter: ^11.0.0
  package_info_plus: ^9.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true
  generate: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/data/


  fonts:
    - family: IranSans
      fonts:
        - asset: assets/fonts/IranSans.ttf
